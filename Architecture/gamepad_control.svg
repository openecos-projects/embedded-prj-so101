<svg xmlns="http://www.w3.org/2000/svg" width="620" height="720" font-family="monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <rect x="10" y="10" width="600" height="40" rx="6" fill="#1a1a2e"/>
  <text x="310" y="36" text-anchor="middle" fill="white" font-size="16" font-weight="bold">手柄控制机械臂 架构图</text>

  <!-- Layer 1: Input -->
  <rect x="10" y="65" width="600" height="90" rx="6" fill="#e8f4f8" stroke="#2196F3" stroke-width="1.5"/>
  <text x="20" y="83" fill="#1565C0" font-size="11" font-weight="bold">[ 输入层 ]  PS2 无线手柄</text>
  <rect x="30" y="90" width="160" height="50" rx="4" fill="#BBDEFB" stroke="#1976D2"/>
  <text x="110" y="111" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">PS2 手柄接收器</text>
  <text x="110" y="128" text-anchor="middle" fill="#0D47A1" font-size="10">CLK/CMD/DAT/CS</text>
  <rect x="220" y="90" width="180" height="50" rx="4" fill="#BBDEFB" stroke="#1976D2"/>
  <text x="310" y="111" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">GPIO Bit-bang SPI</text>
  <text x="310" y="128" text-anchor="middle" fill="#0D47A1" font-size="10">LSB First · Mode 2 · ~31kHz</text>
  <rect x="430" y="90" width="160" height="50" rx="4" fill="#BBDEFB" stroke="#1976D2"/>
  <text x="510" y="111" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">影子寄存器</text>
  <text x="510" y="128" text-anchor="middle" fill="#0D47A1" font-size="10">gpio_out_shadow (防读回)</text>

  <!-- Arrow 1→2 -->
  <line x1="310" y1="155" x2="310" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="320" y="168" fill="#555" font-size="10">9字节原始数据</text>

  <!-- Layer 2: MCU Application -->
  <rect x="10" y="178" width="600" height="200" rx="6" fill="#f3e5f5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="20" y="196" fill="#6A1B9A" font-size="11" font-weight="bold">[ 应用层 ]  MCU (ECOS_MCU)</text>

  <rect x="30" y="202" width="170" height="60" rx="4" fill="#E1BEE7" stroke="#7B1FA2"/>
  <text x="115" y="222" text-anchor="middle" fill="#4A148C" font-size="11" font-weight="bold">ps2_read_packet()</text>
  <text x="115" y="238" text-anchor="middle" fill="#4A148C" font-size="10">解析 9 字节</text>
  <text x="115" y="252" text-anchor="middle" fill="#4A148C" font-size="10">data[3]/data[4] 按键位</text>

  <line x1="200" y1="232" x2="225" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="225" y="202" width="180" height="60" rx="4" fill="#E1BEE7" stroke="#7B1FA2"/>
  <text x="315" y="222" text-anchor="middle" fill="#4A148C" font-size="11" font-weight="bold">按键→关节映射</text>
  <text x="315" y="238" text-anchor="middle" fill="#4A148C" font-size="10">switch(joint_id)</text>
  <text x="315" y="252" text-anchor="middle" fill="#4A148C" font-size="10">step × dir → Δ脉冲</text>

  <line x1="405" y1="232" x2="430" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="430" y="202" width="160" height="60" rx="4" fill="#E1BEE7" stroke="#7B1FA2"/>
  <text x="510" y="222" text-anchor="middle" fill="#4A148C" font-size="11" font-weight="bold">安全钳位</text>
  <text x="510" y="238" text-anchor="middle" fill="#4A148C" font-size="10">valid_min / valid_max</text>
  <text x="510" y="252" text-anchor="middle" fill="#4A148C" font-size="10">int32 防回绕</text>

  <!-- home_with_monitor -->
  <rect x="30" y="285" width="560" height="80" rx="4" fill="#CE93D8" stroke="#7B1FA2"/>
  <text x="310" y="305" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold">home_with_monitor()  —  SELECT键触发归位</text>
  <text x="310" y="322" text-anchor="middle" fill="#1a1a2e" font-size="10">6路同时发送 home_pos → 轮询 read_servo_pos() → 误差 &lt; 8 脉冲 判定到位</text>
  <text x="310" y="338" text-anchor="middle" fill="#1a1a2e" font-size="10">校准矩阵: ID1~6 各有 {min, max, home, dir, step}</text>
  <text x="310" y="354" text-anchor="middle" fill="#1a1a2e" font-size="10">采样周期: 15ms (FREQ_MS)</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="378" x2="310" y2="398" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="320" y="391" fill="#555" font-size="10">target_pos · speed=0(最大速)</text>
  <!-- Layer 3: Servo Driver -->
  <rect x="10" y="400" width="600" height="90" rx="6" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="20" y="418" fill="#1B5E20" font-size="11" font-weight="bold">[ 驱动层 ]  舵机串口驱动  send_servo_cmd()</text>
  <rect x="30" y="424" width="200" height="52" rx="4" fill="#C8E6C9" stroke="#388E3C"/>
  <text x="130" y="444" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">二进制协议封包</text>
  <text x="130" y="460" text-anchor="middle" fill="#1B5E20" font-size="10">0xFF 0xFF ID LEN 0x03 0x2A</text>
  <text x="130" y="474" text-anchor="middle" fill="#1B5E20" font-size="10">posL posH 0x00 0x00 spdL spdH CHK</text>
  <rect x="260" y="424" width="160" height="52" rx="4" fill="#C8E6C9" stroke="#388E3C"/>
  <text x="340" y="444" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">hp_uart 半双工</text>
  <text x="340" y="460" text-anchor="middle" fill="#1B5E20" font-size="10">1 Mbps · 13字节/帧</text>
  <text x="340" y="474" text-anchor="middle" fill="#1B5E20" font-size="10">校验和: ~sum(byte[2..n-1])</text>
  <rect x="450" y="424" width="140" height="52" rx="4" fill="#C8E6C9" stroke="#388E3C"/>
  <text x="520" y="444" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">位置反馈</text>
  <text x="520" y="460" text-anchor="middle" fill="#1B5E20" font-size="10">read_servo_pos()</text>
  <text x="520" y="474" text-anchor="middle" fill="#1B5E20" font-size="10">8字节读取指令</text>

  <!-- Arrow 3→4 -->
  <line x1="310" y1="490" x2="310" y2="510" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 4: Hardware -->
  <rect x="10" y="512" width="600" height="90" rx="6" fill="#fff3e0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="20" y="530" fill="#E65100" font-size="11" font-weight="bold">[ 硬件层 ]  SO-ARM100 六轴串行舵机</text>
  <text x="310" y="555" text-anchor="middle" fill="#BF360C" font-size="11">ID1: 底座旋转    ID2: 大臂    ID3: 小臂</text>
  <text x="310" y="575" text-anchor="middle" fill="#BF360C" font-size="11">ID4: 手腕俯仰    ID5: 手腕旋转    ID6: 夹爪</text>
  <text x="310" y="595" text-anchor="middle" fill="#BF360C" font-size="10">脉冲范围: 82~3926  ·  总线: 半双工 UART</text>

  <!-- Legend -->
  <rect x="10" y="615" width="600" height="95" rx="6" fill="#fafafa" stroke="#ccc"/>
  <text x="20" y="633" fill="#333" font-size="10" font-weight="bold">数据流:</text>
  <text x="20" y="653" fill="#555" font-size="10">手柄按键 → GPIO SPI读9字节 → 解析btn → 映射关节步进 → 钳位 → UART下发位置指令</text>
  <text x="20" y="673" fill="#555" font-size="10">通信: PS2 ←GPIO→ MCU ←UART 1Mbps→ 舵机总线</text>
  <text x="20" y="693" fill="#555" font-size="10">保护: 影子寄存器防读回 · int32防回绕 · valid_min/max钳位</text>
</svg>
